<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Drive Gallery</title>
    <style>
        #gallery { display: flex; flex-wrap: wrap; gap: 15px; }
        .img-container { text-align: center; width: 200px; }
        img { width: 100%; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h2>My Google Drive Images</h2>
    <div id="gallery">Loading images...</div>

    <script>
        const API_KEY = 'AIzaSyC7E7azBRm5DTDGaETFy1_2boqadzESoFI';
        const FOLDER_ID = '18U_nLLKMW0dHdyDDghLAbXDo-jht-l_E';
        
        // This URL fetches files from a specific folder that are images
        const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name)&key=${API_KEY}`;

        async function fetchImages() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = ''; // Clear loading text

                console.log(data.files.length + ' files found'); // Log the number of files found

                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const container = document.createElement('div');
                        container.className = 'img-container';
                        
                        // 'uc' stands for 'user content' - it forces the direct image link
                        const img = document.createElement('img');
                        img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
                        
                        const label = document.createElement('p');
                        label.innerText = file.name;

                        container.appendChild(img);
                        container.appendChild(label);
                        gallery.appendChild(container);
                    });
                } else {
                    gallery.innerHTML = 'No images found in this folder.';
                }
            } catch (error) {
                console.error('Error fetching Drive files:', error);
                document.getElementById('gallery').innerHTML = 'Error loading images. Check console.';
            }
        }

        fetchImages();
    </script>
</body>
</html>
